<head>

    <title>HRGUG 2026 - Event Schedule</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-color: #0070f3;
    --secondary-color: #ff6b6b;
    --success-color: #50C878;
    --text-primary: #1a1a1a;
    --text-secondary: #666;
    --bg-primary: #f8f9fa;
    --bg-secondary: #ffffff;
    --border-color: #e0e0e0;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
}

#app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 2rem 1rem;
    text-align: center;
    box-shadow: var(--shadow-md);
}

.header-content h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
}

.subtitle {
    font-size: 1.2rem;
    opacity: 0.9;
    margin-bottom: 0.5rem;
}

.event-info {
    font-size: 1rem;
    opacity: 0.8;
}

.room-legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: white;
    font-size: 0.9rem;
    font-weight: 500;
}

.legend-color {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: 2px solid rgba(255, 255, 255, 0.3);
}

main {
    flex: 1;
    padding: 2rem 1rem;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}

.day-section {
    margin-bottom: 3rem;
}

.day-title {
    font-size: 1.8rem;
    color: white;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

.timeline-container {
    display: flex;
    flex-direction: column;
    gap: 0;
}

/* Timeline Row - contains time slot + parallel sessions */
.timeline-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    position: relative;
}

/* Time Slot Column (left side) */
.time-slot {
    min-width: 120px;
    max-width: 120px;
    padding: 1rem;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    position: sticky;
    top: 1rem;
    align-self: flex-start;
}

.time-slot-start,
.time-slot-end {
    font-size: 1rem;
    font-weight: 700;
    color: white;
    white-space: nowrap;
}

.time-slot-separator {
    font-size: 1.2rem;
    color: rgba(255, 255, 255, 0.7);
}

/* Parallel Sessions Container (right side) */
.parallel-sessions {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1rem;
}

/* Session Card - redesigned for grid layout */
.timeline-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
    border-top: 4px solid var(--primary-color);
    position: relative;
    overflow: hidden;
    height: fit-content;
}

.timeline-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.timeline-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.timeline-card:hover::before {
    transform: scaleX(1);
}

.timeline-content {
    flex: 1;
}

.break-card {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-top-color: #95a5a6 !important;
    cursor: default;
    grid-column: 1 / -1; /* Span all columns for breaks */
}

.break-card:hover {
    transform: none;
    box-shadow: var(--shadow-sm);
}

.break-card::before {
    display: none;
}

/* Finished Session Styles */
.timeline-card.finished {
    opacity: 0.5;
    background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
    cursor: default;
}

.timeline-card.finished:hover {
    transform: none;
    box-shadow: var(--shadow-sm);
}

.timeline-card.finished::before {
    display: none;
}

.timeline-card.finished .session-id {
    color: #999;
}

.timeline-card.finished .session-title,
.timeline-card.finished .session-speaker,
.timeline-card.finished .session-company {
    color: #888;
}

.timeline-card.finished .session-room {
    opacity: 0.6;
}

.finished-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    background: #999;
    color: white;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-left: 0.5rem;
}

.break-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 0.5rem;
}

.break-location {
    color: #7f8c8d;
    font-size: 0.95rem;
    font-weight: 500;
}

.session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
}

.session-id {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--primary-color);
}

.session-room {
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.85rem;
    color: white;
    font-weight: 600;
}

.session-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--text-primary);
    line-height: 1.4;
}

.session-speaker {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
}

.speaker-icon {
    font-size: 1rem;
}

.session-company {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 500;
}

.session-detail-view {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.back-button {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    margin-bottom: 1.5rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    font-weight: 600;
}

.back-button:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateX(-5px);
}

.session-detail-card {
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: var(--shadow-lg);
}

.detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.session-id-large {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary-color);
}

.session-room-large {
    padding: 0.5rem 1.5rem;
    border-radius: 25px;
    color: white;
    font-weight: 600;
    font-size: 1rem;
}

.detail-title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: var(--text-primary);
    line-height: 1.3;
}

.detail-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: var(--bg-primary);
    border-radius: 12px;
}

.info-item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
}

.info-icon {
    font-size: 1.5rem;
    margin-top: 0.25rem;
}

.info-content strong {
    display: block;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.info-content p {
    color: var(--text-primary);
    font-weight: 500;
}

.detail-description {
    margin-bottom: 2rem;
}

.detail-description h2 {
    font-size: 1.5rem;
    margin-bottom: 1rem;
    color: var(--text-primary);
}

.detail-description p {
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--text-secondary);
}

.add-to-calendar-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
    width: 100%;
    max-width: 400px;
    display: block;
    margin: 0 auto;
}

.add-to-calendar-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.add-to-calendar-btn:active {
    transform: translateY(0);
}

.footer {
    background: rgba(0, 0, 0, 0.3);
    color: white;
    text-align: center;
    padding: 1.5rem;
    margin-top: auto;
    backdrop-filter: blur(10px);
}

.scroll-to-top {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: all 0.3s ease;
    opacity: 0;
    visibility: hidden;
    z-index: 1000;
}

.scroll-to-top.visible {
    opacity: 1;
    visibility: visible;
}

.scroll-to-top:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
}

.scroll-to-top:active {
    transform: translateY(-2px);
}

@media (max-width: 768px) {
    .header-content h1 {
        font-size: 2rem;
    }

    .subtitle {
        font-size: 1rem;
    }

    /* Stack timeline rows on mobile */
    .timeline-row {
        flex-direction: column;
        gap: 0.5rem;
    }

    .time-slot {
        min-width: 100%;
        max-width: 100%;
        position: static;
        flex-direction: row;
        justify-content: center;
    }

    .time-slot-separator {
        margin: 0 0.5rem;
    }

    /* Single column for parallel sessions on mobile */
    .parallel-sessions {
        grid-template-columns: 1fr;
    }

    .session-detail-card {
        padding: 1.5rem;
    }

    .detail-title {
        font-size: 1.5rem;
    }

    .detail-info-grid {
        grid-template-columns: 1fr;
        padding: 1rem;
    }

    main {
        padding: 1rem 0.5rem;
    }

    .day-title {
        font-size: 1.4rem;
    }
}

@media (max-width: 480px) {
    .header-content h1 {
        font-size: 1.5rem;
    }

    .session-title {
        font-size: 1rem;
    }

    .detail-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .timeline-time {
        font-size: 0.9rem;
    }

    .time-badge {
        font-size: 1rem;
    }
}
    </style>
</head>

// Helper function to check if a session has finished (using CET timezone)
function isSessionFinished(session) {
    // Get current time in CET (UTC+1 standard, UTC+2 during DST)
    const now = new Date();

    // Create a date object for the session end time in CET
    // Format: "2026-03-11" + "T" + "09:10" + ":00"
    const sessionEndString = `${session.date}T${session.timeTo}:00`;

    // Parse the session end time and treat it as CET
    // We'll create the date and then adjust for CET timezone
    const sessionEnd = new Date(sessionEndString);

    // Get current time in CET by using toLocaleString
    const cetTimeString = now.toLocaleString('en-US', {
        timeZone: 'Europe/Berlin',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });

    // Parse the CET time string to create a proper Date object
    const [datePart, timePart] = cetTimeString.split(', ');
    const [month, day, year] = datePart.split('/');
    const cetNow = new Date(`${year}-${month}-${day}T${timePart}`);

    // Compare: if current CET time is after session end time, session is finished
    return cetNow > sessionEnd;
}

// Helper function to generate .ics file content
function generateICS(session) {
    const startDateTime = `${session.date.replace(/-/g, '')}T${session.timeFrom.replace(':', '')}00`;
    const endDateTime = `${session.date.replace(/-/g, '')}T${session.timeTo.replace(':', '')}00`;
    const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//HRGUG 2026//Event Schedule//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
DTSTART:${startDateTime}
DTEND:${endDateTime}
DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z
UID:${session.id}-hrgug2026@event.com
SUMMARY:${session.title}
DESCRIPTION:${session.description}\\n\\nSpeaker: ${session.speaker}\\nCompany: ${session.company}
LOCATION:Room ${session.room}, St. Leon-Rot, Germany
STATUS:CONFIRMED
BEGIN:VALARM
TRIGGER:-PT15M
ACTION:DISPLAY
DESCRIPTION:Reminder: ${session.title} starts in 15 minutes
END:VALARM
END:VEVENT
END:VCALENDAR`;
    return icsContent;
}

function downloadICS(session) {
    const icsContent = generateICS(session);
    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `HRGUG2026-${session.id}.ics`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

}

function formatDate(dateString) {
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    return new Date(dateString).toLocaleDateString('en-US', options);
}

function createSessionCard(session) {
    const card = document.createElement('div');
    const finished = !session.isBreak && isSessionFinished(session);

    // Set base class
    if (session.isBreak) {
        card.className = 'timeline-card break-card';
    } else if (finished) {
        card.className = 'timeline-card finished';
    } else {
        card.className = 'timeline-card';
    }

    if (!session.isBreak) {
        card.style.borderTopColor = getRoomColor(session.room);
    }

    if (session.isBreak) {
        card.innerHTML = `
            <h3 class="break-title">${session.title}</h3>
            <div class="break-location">📍 ${session.room}</div>
        `;
    } else {
        const finishedBadge = finished ? '<span class="finished-badge">✓ Finished</span>' : '';
        card.innerHTML = `
            <div class="session-header">
                <span class="session-id">${session.id}${finishedBadge}</span>
                <span class="session-room" style="background-color: ${getRoomColor(session.room)}">${session.room}</span>
            </div>
            <h3 class="session-title">${session.title}</h3>
            <div class="session-speaker">
                <span class="speaker-icon">👤</span>
                ${session.speaker}
            </div>
            <div class="session-company">${session.company}</div>
        `;
        // Only allow clicking on non-finished sessions
        if (!finished) {
            card.addEventListener('click', () => showSessionDetail(session));
        }
    }
    return card;
}

// Group sessions by time slot
function groupSessionsByTime(sessions) {
    const grouped = {};
    sessions.forEach(session => {
        const timeKey = `${session.timeFrom}-${session.timeTo}`;
        if (!grouped[timeKey]) {
            grouped[timeKey] = [];
        }
        grouped[timeKey].push(session);
    });
    return grouped;
}

// Create a timeline row with time slot and parallel sessions
function createTimelineRow(timeKey, sessions) {
    const row = document.createElement('div');
    row.className = 'timeline-row';

    // Create time slot (left side)
    const [timeFrom, timeTo] = timeKey.split('-');
    const timeSlot = document.createElement('div');
    timeSlot.className = 'time-slot';
    timeSlot.innerHTML = `
        <div class="time-slot-start">${timeFrom}</div>
        <div class="time-slot-separator">→</div>
        <div class="time-slot-end">${timeTo}</div>
    `;

    // Create parallel sessions container (right side)
    const parallelContainer = document.createElement('div');
    parallelContainer.className = 'parallel-sessions';

    // Add all sessions for this time slot
    sessions.forEach(session => {
        parallelContainer.appendChild(createSessionCard(session));
    });

    row.appendChild(timeSlot);
    row.appendChild(parallelContainer);
    return row;
}

function populateAgenda() {
    const day1Morning = document.getElementById('day1-morning');
    const day1Afternoon = document.getElementById('day1-afternoon');
    const day2Morning = document.getElementById('day2-morning');
    const day2Afternoon = document.getElementById('day2-afternoon');

    const allSessions = Object.values(sessionsData);

    // Filter sessions for each section
    const day1MorningSessions = allSessions.filter(s => s.date === '2026-03-11' && s.timeFrom < '13:00');
    const day1AfternoonSessions = allSessions.filter(s => s.date === '2026-03-11' && s.timeFrom >= '13:00');
    const day2MorningSessions = allSessions.filter(s => s.date === '2026-03-12' && s.timeFrom < '13:00');
    const day2AfternoonSessions = allSessions.filter(s => s.date === '2026-03-12' && s.timeFrom >= '13:00');

    // Group by time and create timeline rows
    function populateSection(container, sessions, title) {
        container.innerHTML = `<h2 class="day-title">${title}</h2><div class="timeline-container"></div>`;
        const timelineContainer = container.querySelector('.timeline-container');
        const grouped = groupSessionsByTime(sessions);

        // Sort by time and add rows
        Object.keys(grouped)
            .sort((a, b) => a.localeCompare(b))
            .forEach(timeKey => {
                timelineContainer.appendChild(createTimelineRow(timeKey, grouped[timeKey]));
            });
    }

    populateSection(day1Morning, day1MorningSessions, '📆 Wednesday, March 11 - Morning');
    populateSection(day1Afternoon, day1AfternoonSessions, '📆 Wednesday, March 11 - Afternoon');
    populateSection(day2Morning, day2MorningSessions, '📆 Thursday, March 12 - Morning');
    populateSection(day2Afternoon, day2AfternoonSessions, '📆 Thursday, March 12 - Afternoon');
}

function initScrollToTop() {
    const scrollBtn = document.getElementById('scroll-to-top');
    window.addEventListener('scroll', () => {
        if (window.pageYOffset > 300) {
            scrollBtn.classList.add('visible');
        } else {
            scrollBtn.classList.remove('visible');
        }
    });
    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

document.addEventListener('DOMContentLoaded', function() {
    populateAgenda();
    initScrollToTop();
});
